name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release archive
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          MARKETING_VERSION="$tag_version" BUILD_NUMBER="$GITHUB_RUN_NUMBER" Scripts/package-release.sh

      - name: Verify tag version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          app_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' dist/LyricShiori.app/Contents/Info.plist)
          test "$tag_version" = "$app_version"
          test "$GITHUB_RUN_NUMBER" = "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' dist/LyricShiori.app/Contents/Info.plist)"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/LyricShiori-v*.zip --generate-notes
